<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mobilisations AESH 2026</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #f1f5f9; }
        .dot-pulse { 
            background-color: #FCBE00;
            animation: pulse 2s infinite; 
        }
        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(252, 190, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(252, 190, 0, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(252, 190, 0, 0); }
        }
    </style>
</head>
<body class="font-sans flex flex-col w-full h-full">

    <header style="background-color: #5b21b6;" class="text-white p-3 md:p-5 shadow-xl flex justify-between items-center z-20 w-full border-b border-black/10">
        <div class="flex flex-col">
            <h1 class="text-lg md:text-3xl font-black uppercase tracking-tighter italic leading-none">Intersyndicale AESH</h1>
            <p class="text-purple-200 text-[7px] md:text-xs font-bold uppercase tracking-[0.2em] mt-1 opacity-80">Mobilisations 2026</p>
        </div>
        <div class="flex items-center bg-black/20 px-2.5 py-1 md:px-5 md:py-2 rounded-full text-[8px] md:text-[11px] font-black uppercase tracking-widest border border-white/10">
            <span class="w-2 h-2 md:w-2.5 md:h-2.5 rounded-full mr-2 dot-pulse"></span>
            <span style="color: #FCBE00;">Direct</span>
        </div>
    </header>

    <div class="flex flex-col lg:flex-row flex-1 overflow-hidden w-full">
        
        <main class="flex-1 relative bg-slate-200 overflow-hidden order-1">
            <iframe 
                src="https://www.google.com/maps/d/u/0/embed?mid=1ELmpmWnINFu4wniyQZYfUiEQU_EW840" 
                class="absolute left-0 w-full border-0"
                style="top: -72px; height: calc(100% + 72px);"
                allowfullscreen
                loading="lazy">
            </iframe>
        </main>

        <aside class="w-full lg:w-44 bg-white border-t lg:border-t-0 lg:border-l border-slate-200 p-2 md:p-6 flex lg:flex-col items-center justify-around lg:justify-start gap-2 lg:gap-10 z-10 order-2">
            
            <h3 class="hidden lg:block text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2 border-b border-slate-200 pb-2 w-full text-center">
                Organisations
            </h3>
            
            <img src="/logo/logoCgtEduc.png" alt="CGT" class="h-6 md:h-9 lg:h-12 w-auto scale-110 lg:scale-[1.7] transition-all grayscale hover:grayscale-0 opacity-50 hover:opacity-100">
            <img src="/logo/logoFsu.png" alt="FSU" class="h-5 md:h-8 lg:h-10 w-auto lg:scale-[1.3] grayscale hover:grayscale-0 opacity-50 hover:opacity-100">
            <img src="/logo/logoSud.png" alt="SUD" class="h-5 md:h-8 lg:h-10 w-auto lg:scale-[1.25] grayscale hover:grayscale-0 opacity-50  hover:opacity-100">
            <img src="/logo/logoUnsa.png" alt="UNSA" class="h-5 md:h-8 lg:h-10 w-auto lg:scale-[1.25] grayscale hover:grayscale-0 opacity-50 hover:opacity-100">
            <img src="/logo/logoSnalc.png" alt="SNALC" class="h-5 md:h-8 lg:h-10 w-auto lg:scale-[1.25] grayscale hover:grayscale-0 opacity-50 hover:opacity-100">

            <div class="hidden lg:block mt-auto text-[12px] text-slate-400 text-left uppercase font-bold tracking-[0.2em]">
               MOBILISATION AESH 
                <p class=" h-8 italic bold">Données misent à jour régulièrement</p>
                <p>• 2026 •</p>
            </div>
        </aside>
    </div>

</body>
</html>
